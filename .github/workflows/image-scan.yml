# This workflow will scan the docker image for vulnerabilities using trivy

name: Image Scan Workflow

on:
    workflow_call:

jobs:
    image-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Pull Image
              run: docker pull ${{ vars.DOCKER_USERNAME }}/two-tier-app_flask-app

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@0.35.0
              with:
                scan-type: 'repo'
                severity: 'CRITICAL'
                exit-code: 1