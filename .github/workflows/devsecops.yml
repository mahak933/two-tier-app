
name: DevsecOps Workflow

on:   
    workflow_dispatch:

jobs:

        call-workflow:
            uses: username/repo/.github/workflows/reusable.yml@project
            
        Code-Quality:
            uses: ./.github/workflows/code-quality.yml

        secrets-scan:
            uses: ./.github/workflows/secrets-scan.yml
            
        dependency-scan:
            uses: ./.github/workflows/image-scan.yml
            
        dockfilelint:
            uses: ./.github/workflows/dockfilelint.yml

            